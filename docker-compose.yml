services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: survey_app
      MYSQL_USER: survey
      MYSQL_PASSWORD: survey_password
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  app-backend:
    build:
      context: ./backend
    env_file:
      - .env
    environment:
      DATABASE_URL: "mysql://survey:survey_password@mysql:3306/survey_app"
      FRONTEND_ORIGIN: "http://localhost:8080"
    ports:
      - "3000:3000"
    volumes:
      - backend-uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy

  app-frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: "http://localhost:3000/api"
    ports:
      - "8080:80"
    depends_on:
      - app-backend

volumes:
  mysql-data:
  minio-data:
  backend-uploads:
